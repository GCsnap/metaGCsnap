# Configuration file to set arguments for GCsnap.
# To change argument, change: value: entry.
# E.g. value: 1 to value: 2
# ---------------------------------------
# 
out-label:
    value: 
        /scicore/home/schwede/pasqua0002/metaGCsnap/workflow/allSnap/tutorial/allSnap
    type: str
    help: Name of output directory. If default, name of the input file.
ncbi-user-email:
    value: jacopo.pasqualini95@gmail.com   
    type: str
    help: your ncbi associated mail.
ncbi-api-key:
    value: 61f051c4414e5271a6f4268fbf4b7908a308
    type: str
    help: your ncbi api key.
MGnify-path:
    value: /scicore/home/schwede/pasqua0002/metaGCsnap/data/MGnify_2023_02
    type: str
    help: Path to the MGnify database folder. To get all the data, look at the ./supplementary folder
MGnify-proxies:
    value: {'http': 'http://squid.deploy.int:3128', 'https': 'http://squid.deploy.int:3128'}
    type: dict
    help: Proxies to use for MGnify database download.
genome-classification:
    value: binning
    type: str
    choices:
      - binning
      - taxonomy
    help: Method to classify metagenomic contigs.
kraken-path:
    value: /scicore/home/schwede/pasqua0002/metaGCsnap/data/kraken/GTDB
    type: str
    help: Path to the Kraken database folder for taxonomic classification. To get all the data, look at the ./supplementary folder
assemblies-data-update-age:
    value: 14
    type: int
    help: Age of the assembly files in days until they are downlaoded again.
n-cpu:
    value: 4
    type: int
    help: Number of cores to use.
n-nodes:
    value: 1
    type: int
    help: Number of nodes to use (SLURM --nodes).
n-ranks-per-node:
    value: 20
    type: int
    help: Number of MPI ranks per node to use (SLURM --ntasks-per-node).
n-cpus-per-rank:
    value: 1
    type: int
    help: Number of CPUs per rank to use (SLURM --cpus-per-task) for MMseqs2. 
        Total number of CPU cores per node needed = n-ranks-per-node * 
        n-cpus-per-rank.
data-path:
    value: /storage/shared/msc/gcsnap_data/
    type: str
    help: Path to the data folder.
tmp-mmseqs-folder:
    value:
    type: str
    help: The temporary folder to store mmseqs files. May be changed so that 
        intermediary mmseqs files are saved somewhere else then the automatic 
        'out-label' directory.
tmp-folder:
    value: ./tmp
    type: str
    help: The temporary folder to store mmseqs files. May be changed so that intermediary
        mmseqs files are saved somewhere else then the automatic 'out-label' directory.
foldseek-executable-path:
    value:
    type: str
    help: Path of Foldseek executable (i.e., foldseek) if not installed in Conda environment.
mmseqs-executable-path:
    value: '/scicore/home/schwede/pasqua0002/miniconda3/envs/metaGCsnap/bin/mmseqs'
    type: str
    help: Path of MMseqs executable (i.e., mmseqs.bat) if not installed in Conda environment.
sourmash-executable-path:
    value: '/scicore/home/schwede/pasqua0002/miniconda3/envs/metaGCsnap/bin/sourmash'
    type: str
    help: Path of Sourmash executable (i.e., sourmash) if not installed in Conda environment.
collect-only:
    value: false
    type: bool
    help: Boolean statement to make GCsnap collect genomic contexts only, 
        without comparing them.
clans-patterns:
    value:
    type: str
    help: Patterns to identify the clusters to analyse. They will be used to 
        select the individual clusters in the clans map to analyse.
clans-file:
    value:
    type: str
    help: Used only for advanced interactive output representation (Clans file 
        if the input is a clans file and -operon_cluster_advanced is set to 
        True).
n-flanking5:
    value: 4
    type: int
    help: Number of flanking sequences to take on 5' end.
n-flanking3:
    value: 4
    type: int
    help: Number of flanking sequences to take on 3' end.
exclude-partial:
    value: false
    type: bool
    help: Exclude partial operon/genomic_context blocks. If turned off, partial 
        cases will still be ignored to get the most common genomic features.
max-evalue:
    value: 0.001
    type: float
    help: Max e-value at which two sequences are considered to be homologous. 
        Required to define protein families.
default-base:
    value: 10
    type: int
    help: Artificial distance value for two sequences that do not match with an 
        E-value better than --max-evalue.
min-coverage:
    value: 0.7
    type: float
    help: Minimum coverage of target and subject a match needs to be so that two
        sequences are considered to be homologous. Required to define protein 
        families.
num-iterations:
    value: 1
    type: int
    help: Number of iterations for all-against-all searches. Required to define 
        protein families.
get-pdb:
    value: true
    type: bool
    help: Get PDB information for representatives of the families found.
functional-annotation-files-path:
    value:
    type: str
    help: Path to the functional annotation files. If not specified, nothing 
        annotated.
operon-cluster-advanced:
    value: false
    type: bool
    help: Boolean statement to use the operon clustering advanced mode using 
        PacMAP.
max-family-freq:
    value: 20
    type: int
    help: Maximum frequency of a family in the set of genomic contexts found to 
        be considered for advanced operon clustering.
min-family-freq:
    value: 2
    type: int
    help: Minimum frequency of a family in the set of genomic contexts found to 
        be considered for advanced operon clustering.
min-family-freq-accross-contexts:
    value: 30
    type: int
    help: Minimum frequency of a family in a conserved genomic context type to 
        be considered as a member.
n-max-operons:
    value: 30
    type: int
    help: Maximum number of top most populated operon/genomic_context block 
        types.
get-taxonomy:
    value: true
    type: bool
    help: Boolean statement to get and map taxonomy information.
annotate-TM:
    value: false
    type: bool
    help: Boolean statement to find sequence features in the flanking genes.
annotation-TM-mode:
    value: uniprot
    type: str
    help: Method to use to find transmembrane segments.
    choices:
      - phobius
      - tmhmm
      - uniprot
annotation-TM-file:
    value:
    type: str
    help: File with pre-computed transmembrane features. Only use when the 
        targets correspond to a single project (no multiple fasta or text 
        files).
interactive:
    value: true
    type: bool
    help: Boolean statement to make the interactive html output.
genomic-context-cmap:
    value: Spectral
    type: str
    help: Color map (as of matplotlib) to assign colors to and plot the syntenic
        blocks.
gc-legend-mode:
    value: species
    type: str
    help: Mode of the genomic context legend.
    choices:
      - species
      - ncbi_code
out-format:
    value: png
    type: str
    help: Output format of the core figures.
    choices:
      - png
      - svg
      - pdf
min-coocc:
    value: 0.3
    type: float
    help: Minimum maximum co-occurrence of two genes to be connected in the 
        graphs.
in-tree:
    value:
    type: str
    help: Input phylogenetic tree. Only use when the targets correspond to a 
        single project (no multiple fasta or text files).
in-tree-format:
    value: newick
    type: str
    help: Format of the input phylogenetic tree.
    choices:
      - newick
      - nexus
      - phyloxml
      - phyloxml-strict
      - phyloxml-extended
      - phyloxml-complete
sort-mode:
    value: taxonomy
    type: str
    help: Mode to sort the genomic contexts.
    choices:
      - taxonomy
      - as_input
      - tree
      - operon
      - operon cluster
overwrite-config:
    value: false
    type: bool
    help: Overwrite the argument value in config file with CLI value.
